{% extends "base.html" %}

{% block content %}
<div class="card narrow">

  <h1>Backup & Restore</h1>

  <div class="section">
    <h2>Download Backup</h2>
    <p>Download a full copy of your inventory database.</p>
    <a href="/backup" class="button">Download .db</a>
  </div>

  <hr>

  <div class="section danger">
    <h2>Restore Database</h2>
    <p>
      Upload a backup file to restore your inventory.<br>
      ⚠️ This will overwrite ALL current data.
    </p>

    <form action="/restore" method="post" enctype="multipart/form-data" class="form">
      <input type="file" name="file" accept=".db" required>
      <button type="submit" class="danger">Restore Database</button>
    </form>
  </div>

</div>
{% endblock %}
