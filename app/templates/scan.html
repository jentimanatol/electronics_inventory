{% extends "base.html" %}
{% block content %}
<div class="card">
  <h1>Scan QR</h1>
  <p class="muted">Use your phone camera or paste a scanned URL.</p>
  <div class="btnrow">
    <button onclick="startScanner()">Start camera scanner</button>
  </div>
  <div id="reader" style="max-width:420px"></div>

  <hr>
  <form class="form" onsubmit="openScanned(event)">
    <label>Paste scanned URL
      <input type="text" id="manualUrl" placeholder="https://.../items/123">
    </label>
    <button type="submit">Open</button>
  </form>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
let scanner;
function openScanned(ev){
  ev.preventDefault();
  const url = document.getElementById('manualUrl').value.trim();
  if(url) window.location.href = url;
}
function startScanner(){
  const el = document.getElementById("reader");
  scanner = new Html5Qrcode("reader");
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      scanner.stop().then(() => {
        window.location.href = decodedText;
      });
    },
    () => {}
  ).catch(err => {
    el.innerHTML = "<p>Camera scanner could not start. Use the manual field below.</p>";
  });
}
</script>
{% endblock %}
