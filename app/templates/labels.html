{% extends "base.html" %}
{% block content %}
<div class="card">
  <div class="row between">
    <h1>Printable labels</h1>
    <button onclick="window.print()">Print</button>
  </div>
  <div class="labels">
    {% for item in items %}
    <div class="label">
      <div class="label-title">{{ item['item_type'] }} • {{ item['value_model'] }}</div>
      <div class="label-sub">{{ item['location'] }} • Qty {{ item['quantity'] }}</div>
      {% if item['qr_filename'] %}
      <img src="/media/{{ item['qr_filename'] }}" alt="QR">
      {% endif %}
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
